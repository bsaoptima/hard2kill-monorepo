// HARD2KILL CS 1.6 dedicated server config.
// Bind-mounted read-only into the container at /xashds/cstrike/server.cfg
// so these settings survive container recreation (docker compose down/up).

hostname "Hard2Kill"
sv_lan 0
public 0

// Gameplay — TDM settings. CSDM plugins enforce most of these from csdm.cfg,
// but setting here too ensures they stick at boot even if a plugin fails to load.
mp_friendlyfire 0
mp_timelimit 30
mp_autoteambalance 1
mp_limitteams 2
mp_freezetime 0
mp_buytime 0
mp_startmoney 16000
mp_c4timer 0
mp_roundtime 9

// Connection tolerance — allow 10 min of tab-backgrounded WebRTC silence
// before we drop the client. Browsers aggressively throttle hidden tabs,
// and the real fix is client-side (Page Visibility API in Phase 1).
sv_timeout 600

// Logging — keep off by default; flip to 1 for debugging.
log off
mp_logdetail 0
